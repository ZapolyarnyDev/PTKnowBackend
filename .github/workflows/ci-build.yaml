name: Release Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Docker image version override
        required: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Resolve image version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"

          if [ -n "$VERSION" ]; then
            echo "VERSION=$VERSION" >> "$GITHUB_ENV"
            exit 0
          fi

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            VERSION="latest"
          else
            VERSION="$GITHUB_SHA"
          fi

          if [ -z "$VERSION" ]; then
            echo "VERSION must not be empty" >&2
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Configure Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            EXPOSE_PORT=8080
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/site-backend:${{ env.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/site-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/site-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/site-backend:buildcache,mode=max
