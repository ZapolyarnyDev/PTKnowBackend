name: Сборка бекенд части сайта

on:
  workflow_dispatch:
    inputs:
      version:
        description: Версия образа
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Проверка репозитория
        uses: actions/checkout@v4

      - name: Установка JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Версионирование образа
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=latest
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Добавляем право на выполнение Gradle
        run: chmod +x ./gradlew

      - name: Настройка Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Вход в Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Сборка и публикация образа
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            EXPOSE_PORT=8080
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/site-backend:${{ env.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/site-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/site-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/site-backend:buildcache,mode=max
