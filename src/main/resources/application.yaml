server:
  port: ${PTKNOW_PORT}

spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    baseline-version: 1
    validate-on-migrate: true
    clean-disabled: true
  datasource:
    url: jdbc:postgresql://${PTKNOW_DATASOURCE_ADDRESS}/${PTKNOW_DATASOURCE_NAME}
    username: ${PTKNOW_DATASOURCE_USERNAME}
    password: ${PTKNOW_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  application:
    name: ptknow

app:
  file:
    upload-dir: "uploads"

security:
  jwt:
    issuer: ${JWT_ISSUER}
    key: ${SECRET_JWT_KEY}
    access-token-expiration: PT15M
    refresh-token-expiration: P7D
    refresh-cookie-secure: ${JWT_REFRESH_COOKIE_SECURE:false}
    refresh-cookie-same-site: ${JWT_REFRESH_COOKIE_SAME_SITE:Lax}
